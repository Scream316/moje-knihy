<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moje knihy</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 15px 10px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 20px; padding: 5px; }
        h1 { font-size: 1.8em; color: white; margin-bottom: 6px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .subtitle { color: rgba(255,255,255,0.9); font-size: 0.9em; margin-bottom: 15px; }
        
        .search-container {
            max-width: 400px;
            margin: 0 auto 25px auto;
            padding: 0 10px;
        }
        .search-input {
            width: 100%;
            padding: 12px 20px;
            font-size: 1em;
            border: none;
            border-radius: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            outline: none;
            transition: box-shadow 0.2s;
        }
        .search-input:focus {
            box-shadow: 0 4px 20px rgba(0,0,0,0.35);
        }

        .books-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }
        .book-card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 3px 10px rgba(0,0,0,0.15);
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
        }
        .book-card:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.25); }
        .cover-wrapper { width: 100%; height: 255px; background: #e2e8f0; }
        .book-cover { width: 100%; height: 100%; object-fit: cover; }
        .book-info { padding: 12px; display: flex; flex-direction: column; flex-grow: 1; justify-content: space-between; }
        .book-details { margin-bottom: 8px; }
        .book-title { font-size: 0.85em; color: #333; margin-bottom: 4px; font-weight: 600; line-height: 1.35; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .book-author { font-size: 0.7em; color: #666; line-height: 1.4; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .book-link { display: block; text-align: center; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 7px 10px; border-radius: 4px; text-decoration: none; font-size: 0.75em; font-weight: 500; transition: opacity 0.2s; margin-top: auto; }
        .book-link:hover { opacity: 0.9; }
        .empty-message { text-align: center; color: white; font-size: 0.95em; padding: 35px; background: rgba(255,255,255,0.1); border-radius: 8px; grid-column: 1 / -1; }
        
        @media (max-width: 768px) {
            .books-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
            .cover-wrapper { height: 200px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 Moje knihy</h1>
            <p class="subtitle" id="bookCounter">Načítám seznam...</p>
            
            <div class="search-container">
                <input type="text" id="searchInput" class="search-input" placeholder="Hledat knihu nebo autora...">
            </div>
        </header>
        <div id="booksGrid" class="books-grid"></div>
    </div>

    <script>
        const BOOKS_JSON_URL = './books.json';
        // Jako fallback použijeme neutrální, hezkou šedou ikonu knihy
        const FALLBACK_COVER = 'https://images.unsplash.com/photo-1543002588-bfa74002ed7e?w=400';
        let allBooks = []; 

        async function loadBooks() {
            try {
                const response = await fetch(BOOKS_JSON_URL);
                const data = await response.json();
                allBooks = data.knihy || [];
                
                document.getElementById('bookCounter').innerText = `Celkem v seznamu přání: ${allBooks.length} knih`;
                renderBooks(allBooks);
            } catch (e) {
                console.error(e);
                document.getElementById('booksGrid').innerHTML = '<div class="empty-message">❌ Chyba při načítání knih z JSONu.</div>';
            }
        }

        function renderBooks(booksToRender) {
            const booksGrid = document.getElementById('booksGrid');
            
            if (booksToRender.length === 0) {
                booksGrid.innerHTML = '<div class="empty-message">🔍 Žádné odpovídající knihy nebyly nalezeny.</div>';
                return;
            }

            let htmlGrid = '';
            for (const book of booksToRender) {
                // NOVÝ SYSTÉM: Hledáme stabilně v Open Library podle názvu knihy
                // Tím kompletně obcházíme rozbité a zablokované servery Dobrovského
                const cistyNazevZahedlani = encodeURIComponent(book.nazev);
                const coverUrl = `https://covers.openlibrary.org/b/isbn/${cistyNazevZahedlani}-M.jpg?default=false`;

                const authorText = book.autor === "Neznámý autor" ? "" : book.autor;
                
                htmlGrid += '<div class="book-card">';
                // Pokud Open Library knihu nemá, "onerror" okamžitě přepne na náhradní univerzální obálku
                htmlGrid += `<div class="cover-wrapper"><img src="${coverUrl}" alt="${book.nazev}" class="book-cover" onerror="this.src='${FALLBACK_COVER}'; this.onerror=null;"></div>`;
                htmlGrid += '<div class="book-info">';
                htmlGrid += `<div class="book-details"><h3 class="book-title">${book.nazev}</h3><p class="book-author">${authorText}</p></div>`;
                if (book.dobrovskyUrl) {
                    htmlGrid += `<a href="${book.dobrovskyUrl}" class="book-link" target="_blank">Koupit</a>`;
                }
                htmlGrid += '</div></div>';
            }
            booksGrid.innerHTML = htmlGrid;
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const searchTxt = e.target.value.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
            
            const filtered = allBooks.filter(book => {
                const nazevNormal = book.nazev.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
                const autorNormal = book.autor.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
                return nazevNormal.includes(searchTxt) || autorNormal.includes(searchTxt);
            });
            
            renderBooks(filtered);
        });

        loadBooks();
    </script>
</body>
</html>
