<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta property="og:title" content="Moje knihy - Seznam knih které chci koupit">
    <meta property="og:description" content="Seznam knih které si chci koupit, s odkazami na Dobrovského a náhledy obálek">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://images.unsplash.com/photo-1543002588-bfa74002ed7e?w=500">
    
    <title>Moje knihy</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 15px 10px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 20px;
            padding: 5px;
        }
        
        h1 {
            font-size: 1.8em;
            color: white;
            margin-bottom: 6px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .subtitle {
            color: rgba(255,255,255,0.9);
            font-size: 0.9em;
        }
        
        .books-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 12px;
        }
        
        .book-card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 3px 10px rgba(0,0,0,0.15);
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
        }
        
        .book-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.25);
        }
        
        .book-cover {
            width: 100%;
            height: 250px;
            object-fit: cover;
            background: #e2e8f0;
        }
        
        .book-info {
            padding: 10px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            justify-content: space-between;
        }
        
        .book-details {
            margin-bottom: 8px;
        }
        
        .book-title {
            font-size: 0.85em;
            color: #333;
            margin-bottom: 4px;
            font-weight: 600;
            line-height: 1.35;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }
        
        .book-author {
            font-size: 0.7em;
            color: #666;
            line-height: 1.4;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }
        
        .book-link {
            display: block;
            text-align: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 6px 10px;
            border-radius: 4px;
            text-decoration: none;
            font-size: 0.75em;
            font-weight: 500;
            transition: opacity 0.2s;
            margin-top: auto;
        }
        
        .book-link:hover {
            opacity: 0.9;
        }
        
        .empty-message {
            text-align: center;
            color: white;
            font-size: 0.95em;
            padding: 35px;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            grid-column: 1 / -1;
        }
        
        @media (max-width: 768px) {
            h1 {
                font-size: 1.4em;
            }
            
            .subtitle {
                font-size: 0.85em;
            }
            
            .books-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 10px;
            }
            
            .book-cover {
                height: 200px;
            }
            
            .book-info {
                padding: 8px;
            }
            
            .book-title {
                font-size: 0.75em;
            }
            
            .book-author {
                font-size: 0.65em;
            }
            
            .book-link {
                font-size: 0.7em;
                padding: 5px 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 Moje knihy</h1>
            <p class="subtitle">Seznam knih, které si chci koupit</p>
        </header>
        
        <div id="booksGrid" class="books-grid">
            </div>
    </div>
    
    <script>
        const BOOKS_JSON_URL = './books.json';
        // Jako univerzální záchranu použijeme pěkný obecný obrázek knihy z Unsplash
        const FALLBACK_COVER = 'https://images.unsplash.com/photo-1543002588-bfa74002ed7e?w=400&auto=format&fit=crop&q=60';
        
        async function loadBooks() {
            try {
                const response = await fetch(BOOKS_JSON_URL);
                if (!response.ok) {
                    throw new Error(`Nelze načíst soubor ${BOOKS_JSON_URL} (Status: ${response.status})`);
                }
                const data = await response.json();
                return data.knihy || [];
            } catch (error) {
                console.error('Chyba při načtení nebo zpracování JSONu:', error);
                return [];
            }
        }
        
        async function fetchGoogleCover(title, author) {
            // Pomocná funkce pro samotné volání API
            async function callApi(searchQuery) {
                const query = encodeURIComponent(searchQuery);
                const url = `https://www.googleapis.com/books/v1/volumes?q=${query}&maxResults=1`;
                const response = await fetch(url);
                const data = await response.json();
                if (data.items && data.items[0]?.volumeInfo?.imageLinks?.thumbnail) {
                    return data.items[0].volumeInfo.imageLinks.thumbnail.replace(/^http:\/\//i, 'https://');
                }
                return null;
            }

            try {
                // Pokus 1: Vyhledat kompletní název + autor(i)
                let cover = await callApi(`${title} ${author}`);
                if (cover) return cover;

                // Pokus 2: Pokud tam jsou dva autoři (např. Sanderson, Jordan), zkusíme jen prvního autora a název
                if (author.includes(',')) {
                    const firstAuthor = author.split(',')[0].trim();
                    cover = await callApi(`${title} ${firstAuthor}`);
                    if (cover) return cover;
                }

                // Pokus 3: Poslední záchrana – hledat pouze podle názvu knihy
                cover = await callApi(title);
                if (cover) return cover;

            } catch (error) {
                console.error(`Chyba při hledání obálky pro "${title}":`, error);
            }
            return null;
        }
        
        async function displayBooks() {
            const booksGrid = document.getElementById('booksGrid');
            const books = await loadBooks();
            
            if (books.length === 0) {
                booksGrid.innerHTML = '<div class="empty-message">📖 Žádné knihy nebyly načteny. Zkontrolujte soubor books.json.</div>';
                return;
            }
            
            const bookPromises = books.map(async (book) => {
                let coverUrl = book.obalkaUrl;
                
                if (!coverUrl || coverUrl.trim() === "") {
                    coverUrl = await fetchGoogleCover(book.nazev, book.autor);
                }
                
                if (!coverUrl) {
                    coverUrl = FALLBACK_COVER;
                }
                
                let bookHtml = '<div class="book-card">';
                bookHtml += `<img src="${coverUrl}" alt="${book.nazev}" class="book-cover" onerror="this.src='${FALLBACK_COVER}'">`;
                bookHtml += '<div class="book-info">';
                bookHtml += '<div class="book-details">';
                bookHtml += `<h3 class="book-title">${book.nazev}</h3>`;
                bookHtml += `<p class="book-author">${book.autor}</p>`;
                bookHtml += '</div>';
                
                if (book.dobrovskyUrl) {
                    bookHtml += `<a href="${book.dobrovskyUrl}" class="book-link" target="_blank">Koupit</a>`;
                }
                
                bookHtml += '</div></div>';
                return bookHtml;
            });
            
            const htmlCards = await Promise.all(bookPromises);
            booksGrid.innerHTML = htmlCards.join('');
        }
        
        displayBooks();
    </script>
</body>
</html>
