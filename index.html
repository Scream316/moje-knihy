<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Moje Knihovna</title>
    <style>
        .knihovna-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; padding: 20px; }
        .kniha-karta { background: white; padding: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
        .kniha-obalka { width: 100%; height: 220px; object-fit: contain; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="knihovna-grid" id="knihovna-box"></div>

    <script>
        fetch('books.json')
            .then(r => r.json())
            .then(knihy => {
                const box = document.getElementById('knihovna-box');
                knihy.forEach(kniha => {
                    const karta = document.createElement('div');
                    karta.className = 'kniha-karta';
                    
                    // Použijeme službu, která není tak přísná na referrer
                    // Formát: https://covers.openlibrary.org/b/isbn/[ISBN]-L.jpg
                    // Pokud to selže, použijeme náhradní proxy pro obálky
                    const isbn = kniha.isbn ? kniha.isbn.replace(/-/g, '') : "";
                    const coverUrl = `https://covers.openlibrary.org/b/isbn/${isbn}-L.jpg?default=false`;

                    karta.innerHTML = `
                        <img class="kniha-obalka" 
                             src="${coverUrl}" 
                             onerror="this.onerror=null; this.src='https://via.placeholder.com/150x220?text=Bez+obálky'">
                        <div><b>${kniha.nazev}</b></div>
                        <a href="${kniha.dobrovskyUrl}" target="_blank">Koupit</a>
                    `;
                    box.appendChild(karta);
                });
            });
    </script>
</body>
</html>
