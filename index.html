<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Moje Virtuální Knihovna</title>
    <style>
        .knihovna-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; padding: 20px; }
        .kniha-karta { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
        .kniha-obalka { width: 140px; height: 210px; object-fit: cover; margin-bottom: 10px; border: 1px solid #ddd; }
    </style>
</head>
<body>
    <main class="knihovna-grid" id="knihovna-box"></main>

    <script>
        fetch('books.json')
            .then(r => r.json())
            .then(knihy => {
                const box = document.getElementById('knihovna-box');
                knihy.forEach(kniha => {
                    const karta = document.createElement('div');
                    karta.className = 'kniha-karta';
                    
                    // Sestavíme dotaz pro Google Books "Image Service" (není to API, je to jen link na obrázek)
                    // Tento link není blokován jako API dotazy
                    const nazevProUrl = encodeURIComponent(kniha.nazev + " " + kniha.autor);
                    const imgUrl = `https://books.google.com/books?q=${nazevProUrl}&tbm=isch&sa=X`; // Ilustrační link
                    
                    // Lepší cesta: Použijeme OpenLibrary, která funguje jako přímý zdroj obrázků
                    const openLibUrl = `https://covers.openlibrary.org/search.php?q=${encodeURIComponent(kniha.nazev)}&mode=everything&pretty=true`;

                    karta.innerHTML = `
                        <img class="kniha-obalka" 
                             src="https://books.google.com/books/content?q=${nazevProUrl}&printsec=frontcover&img=1&zoom=1" 
                             onerror="this.src='https://via.placeholder.com/140x210?text=Bez+obálky'">
                        <div class="kniha-nazev">${kniha.nazev}</div>
                        <div class="kniha-autor">${kniha.autor}</div>
                    `;
                    box.appendChild(karta);
                });
            });
    </script>
</body>
</html>
