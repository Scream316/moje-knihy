<script>
    async function zobrazKnihy(knihy) {
        const box = document.getElementById('knihovna-box');
        
        for (const kniha of knihy) {
            const karta = document.createElement('div');
            karta.className = 'kniha-karta';
            
            // Unikátní ID pro následné vložení obálky
            const cardId = 'card-' + Math.random().toString(36).substr(2, 9);
            karta.id = cardId;
            
            karta.innerHTML = `
                <img class="kniha-obalka" src="https://via.placeholder.com/140x210?text=Hledám..." id="img-${cardId}">
                <div class="kniha-nazev">${kniha.nazev}</div>
                <div class="kniha-autor">${kniha.autor}</div>
                <a href="${kniha.dobrovskyUrl}" target="_blank" class="btn-koupit">Koupit</a>
            `;
            box.appendChild(karta);

            // Tady je klíč k úspěchu: Pomalé tempo
            await new Promise(resolve => setTimeout(resolve, 1500));

            try {
                // Vyhledávání podle názvu, nikoliv podle ISBN
                const query = encodeURIComponent(`${kniha.nazev} ${kniha.autor}`);
                const response = await fetch(`https://www.googleapis.com/books/v1/volumes?q=${query}&maxResults=1`);
                const data = await response.json();
                
                if (data.items && data.items[0].volumeInfo.imageLinks) {
                    const img = document.getElementById(`img-${cardId}`);
                    img.src = data.items[0].volumeInfo.imageLinks.thumbnail.replace('http:', 'https:');
                } else {
                    document.getElementById(`img-${cardId}`).src = 'https://via.placeholder.com/140x210?text=Bez+obálky';
                }
            } catch (err) {
                console.error("Chyba při fetch:", err);
            }
        }
    }
</script>
