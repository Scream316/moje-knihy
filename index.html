<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Moje Knihovna</title>
    <style>
        .knihovna-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; padding: 20px; }
        .kniha-karta { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
        .kniha-obalka { width: 140px; height: 210px; object-fit: cover; background: #eee; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="knihovna-grid" id="knihovna-box"></div>

    <script>
        async function nactiKnihy() {
            const response = await fetch('books.json');
            const knihy = await response.json();
            const box = document.getElementById('knihovna-box');

            for (const kniha of knihy) {
                const karta = document.createElement('div');
                karta.className = 'kniha-karta';
                karta.innerHTML = `
                    <img class="kniha-obalka" id="img-${kniha.isbn}" src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=">
                    <div class="kniha-nazev">${kniha.nazev}</div>
                    <a href="${kniha.dobrovskyUrl}" target="_blank">Koupit</a>
                `;
                box.appendChild(karta);

                // ZDE JE KLÍČ: Pauza 2 sekundy mezi každým dotazem, aby nás Google neblokoval
                await new Promise(resolve => setTimeout(resolve, 2000));

                try {
                    // Hledáme podle ISBN, které už máš opravené
                    const res = await fetch(`https://www.googleapis.com/books/v1/volumes?q=isbn:${kniha.isbn.replace(/-/g, '')}&maxResults=1`);
                    const data = await res.json();
                    
                    if (data.items && data.items[0].volumeInfo.imageLinks) {
                        document.getElementById(`img-${kniha.isbn}`).src = data.items[0].volumeInfo.imageLinks.thumbnail.replace('http:', 'https:');
                    } else {
                        document.getElementById(`img-${kniha.isbn}`).src = 'https://via.placeholder.com/140x210?text=Bez+obálky';
                    }
                } catch (e) {
                    console.error("Chyba API:", e);
                }
            }
        }
        nactiKnihy();
    </script>
</body>
</html>
