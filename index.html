<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Wishlist</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Playfair Display', serif; 
            /* Jemné fantasy pozadí s texturou pergamenu */
            background-color: #1a1a2e;
            background-image: radial-gradient(circle at 50% 50%, #2a2a4a 0%, #1a1a2e 100%);
            min-height: 100vh;
            padding: 40px; 
            color: #e0e0e0; 
        }

        h1 { 
            font-family: 'Cinzel', serif;
            font-size: 3.5rem;
            text-align: center; 
            color: #d4af37; /* Zlatá barva */
            margin-bottom: 50px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            letter-spacing: 3px;
            border-bottom: 2px solid #d4af37;
            display: inline-block;
            width: 100%;
            padding-bottom: 10px;
        }
        
        .knihovna-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
            gap: 40px; 
            max-width: 1200px; 
            margin: 0 auto; 
        }
        
        .kniha-karta { 
            background: rgba(255, 255, 255, 0.05); 
            padding: 20px; 
            border-radius: 15px; 
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3); 
            text-align: center;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .kniha-karta:hover { 
            transform: translateY(-15px) scale(1.02); 
            border-color: #d4af37;
        }

        .kniha-obalka { 
            width: 100%; 
            height: 250px; 
            object-fit: cover; 
            border-radius: 5px; 
            margin-bottom: 15px; 
            border: 2px solid #333;
        }
        
        .kniha-nazev { font-size: 1.2em; margin-bottom: 5px; color: #fff; }
        .kniha-autor { color: #aaa; margin-bottom: 15px; font-style: italic; }
        
        .btn-dobrovsky { 
            display: inline-block; 
            padding: 10px 25px; 
            background-color: #27AE60; 
            color: white; 
            text-decoration: none; 
            border-radius: 20px; 
            font-family: sans-serif;
            font-weight: bold; 
            transition: all 0.3s;
        }
        
        .btn-dobrovsky:hover { 
            background-color: #1e8449;
            box-shadow: 0 0 15px rgba(39, 174, 96, 0.6);
        }
    </style>
</head>
<body>

    <h1>Wishlist</h1>
    <main class="knihovna-grid" id="knihovna-box"></main>

    <script>
        fetch('books.json')
            .then(r => r.json())
            .then(knihy => {
                const box = document.getElementById('knihovna-box');
                knihy.forEach(kniha => {
                    const karta = document.createElement('div');
                    karta.className = 'kniha-karta';
                    
                    const query = encodeURIComponent(kniha.nazev + " " + kniha.autor + " book cover");
                    const coverUrl = `https://tse3.mm.bing.net/th?q=${query}&w=300&h=450&c=7&rs=1&p=0&o=5&pid=1.7`;

                    karta.innerHTML = `
                        <img class="kniha-obalka" src="${coverUrl}" onerror="this.src='https://via.placeholder.com/200x300?text=Bez+obálky'">
                        <div class="kniha-nazev">${kniha.nazev}</div>
                        <div class="kniha-autor">${kniha.autor}</div>
                        <a href="${kniha.dobrovskyUrl}" target="_blank" class="btn-dobrovsky">Dobrovský</a>
                    `;
                    box.appendChild(karta);
                });
            });
    </script>
</body>
</html>
