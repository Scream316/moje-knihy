<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Open Graph metadata pro sdílení -->
    <meta property="og:title" content="Moje knihy - Seznam knih které chci koupit">
    <meta property="og:description" content="Seznam knih které si chci koupit, s odkazami na Dobrovského a náhledy obálek">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://via.placeholder.com/300x400/667eea/ffffff?text=📚">
    
    <title>Moje knihy</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 15px 10px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 20px;
            padding: 5px;
        }
        
        h1 {
            font-size: 1.8em;
            color: white;
            margin-bottom: 6px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .subtitle {
            color: rgba(255,255,255,0.9);
            font-size: 0.9em;
        }
        
        .books-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 12px;
        }
        
        .book-card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 3px 10px rgba(0,0,0,0.15);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .book-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.25);
        }
        
        .book-cover {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: #f0f0f0;
        }
        
        .book-info {
            padding: 10px;
        }
        
        .book-title {
            font-size: 0.85em;
            color: #333;
            margin-bottom: 4px;
            font-weight: 600;
            line-height: 1.35;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }
        
        .book-author {
            font-size: 0.7em;
            color: #666;
            margin-bottom: 8px;
            line-height: 1.4;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }
        
        .book-link {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            text-decoration: none;
            font-size: 0.7em;
            font-weight: 500;
            transition: opacity 0.2s;
        }
        
        .book-link:hover {
            opacity: 0.9;
        }
        
        .empty-message {
            text-align: center;
            color: white;
            font-size: 0.95em;
            padding: 35px;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
        }
        
        @media (max-width: 768px) {
            h1 {
                font-size: 1.4em;
            }
            
            .subtitle {
                font-size: 0.85em;
            }
            
            .books-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 10px;
            }
            
            .book-cover {
                height: 140px;
            }
            
            .book-info {
                padding: 8px;
            }
            
            .book-title {
                font-size: 0.75em;
            }
            
            .book-author {
                font-size: 0.65em;
            }
            
            .book-link {
                font-size: 0.65em;
                padding: 4px 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 Moje knihy</h1>
            <p class="subtitle">Seznam knih které si chci koupit</p>
        </header>
        
        <div id="booksGrid" class="books-grid">
            <!-- Knihy se načtou sem -->
        </div>
    </div>
    
    <script>
        const BOOKS_JSON_URL = './books.json';
        
        async function loadBooks() {
            try {
                const response = await fetch(BOOKS_JSON_URL);
                const data = await response.json();
                return data.knihy || [];
            } catch (error) {
                console.error('Chyba při načtení knih:', error);
                return [];
            }
        }
        
        async function displayBooks() {
            const booksGrid = document.getElementById('booksGrid');
            const books = await loadBooks();
            
            if (books.length === 0) {
                booksGrid.innerHTML = '<div class="empty-message">📖 Zatím žádné knihy.</div>';
                return;
            }
            
            let html = '';
            for (const book of books) {
                const coverUrl = book.obalkaUrl || 'https://via.placeholder.com/300x400/667eea/ffffff?text=Book';
                
                html += '<div class="book-card">';
                html += '<img src="' + coverUrl + '" alt="' + book.nazev + '" class="book-cover" onerror="this.src=\'https://via.placeholder.com/300x400/667eea/ffffff?text=Book\'">';
                html += '<div class="book-info">';
                html += '<h3 class="book-title">' + book.nazev + '</h3>';
                html += '<p class="book-author">' + book.autor + '</p>';
                if (book.dobrovskyUrl) {
                    html += '<a href="' + book.dobrovskyUrl + '" class="book-link" target="_blank">Koupit</a>';
                }
                html += '</div></div>';
            }
            
            booksGrid.innerHTML = html;
        }
        
        displayBooks();
    </script>
</body>
</html>
