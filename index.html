<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Wishlist</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Playfair Display', serif; 
            background-color: #1a1a2e;
            background-image: radial-gradient(circle at 50% 50%, #2a2a4a 0%, #1a1a2e 100%);
            min-height: 100vh;
            padding: 40px; 
            color: #e0e0e0; 
            position: relative;
        }

        /* Nový dekorativní box v levém rohu */
        .sidebar-box {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #d4af37;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        .sidebar-box h3 { color: #d4af37; margin: 0 0 10px 0; font-family: 'Cinzel'; font-size: 1rem; }
        .sidebar-box a { display: block; color: #fff; text-decoration: none; margin: 5px 0; font-size: 0.9rem; }
        .sidebar-box a:hover { color: #d4af37; }

        .header-box { text-align: center; margin-bottom: 50px; }

        h1 { 
            font-family: 'Cinzel', serif;
            font-size: 3.5rem;
            color: #d4af37;
            margin: 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            letter-spacing: 3px;
        }

        .decor { color: #d4af37; font-size: 1.5rem; margin: 10px 0; }
        
        #counter { 
            font-size: 1.2rem; color: #aaa; font-style: italic;
            border: 1px solid rgba(212, 175, 55, 0.3);
            display: inline-block; padding: 5px 20px;
            border-radius: 20px; background: rgba(255, 255, 255, 0.03);
        }
        
        .knihovna-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
            gap: 40px; 
            max-width: 1200px; 
            margin: 0 auto; 
        }
        
        .kniha-karta { 
            background: rgba(255, 255, 255, 0.05); 
            padding: 20px; 
            border-radius: 15px; 
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3); 
            text-align: center;
            transition: transform 0.4s;
            /* Flexbox nastavení */
            display: flex;
            flex-direction: column;
        }

        .kniha-karta:hover { transform: translateY(-15px) scale(1.02); border-color: #d4af37; }

        .kniha-obalka { 
            width: 100%; height: 250px; object-fit: cover; 
            border-radius: 5px; margin-bottom: 15px; border: 2px solid #333;
        }
        
        .kniha-nazev { font-size: 1.2em; margin-bottom: 5px; color: #fff; }
        .kniha-autor { color: #aaa; margin-bottom: 15px; font-style: italic; }
        
        .btn-dobrovsky { 
            margin-top: auto; /* Tlačí tlačítko dolů */
            display: inline-block; 
            padding: 10px 25px; 
            background-color: #27AE60; 
            color: white; 
            text-decoration: none; 
            border-radius: 20px; 
            font-family: sans-serif;
            font-weight: bold; 
            transition: all 0.3s;
        }
        
        .btn-dobrovsky:hover { background-color: #1e8449; box-shadow: 0 0 15px rgba(39, 174, 96, 0.6); }
    </style>
</head>
<body>

    <!-- Boxík v levém horním rohu -->
    <div class="sidebar-box">
        <h3>Kde jinde hledat</h3>
        <a href="https://www.knihobot.cz" target="_blank">Knihobot</a>
        <a href="https://trhknih.cz" target="_blank">Trh knih</a>
    </div>

    <div class="header-box">
        <h1>Wishlist</h1>
        <div class="decor">✧ ──── ♞ ──── ✧</div>
        <div id="counter">Načítám poklady...</div>
    </div>

    <main class="knihovna-grid" id="knihovna-box"></main>

    <script>
        fetch('books.json')
            .then(r => r.json())
            .then(knihy => {
                const box = document.getElementById('knihovna-box');
                const counter = document.getElementById('counter');
                counter.innerText = `Počet knih v mé sbírce: ${knihy.length}`;

                knihy.forEach(kniha => {
                    const karta = document.createElement('div');
                    karta.className = 'kniha-karta';
                    
                    const query = encodeURIComponent(kniha.nazev + " " + kniha.autor + " book cover");
                    const coverUrl = `https://tse3.mm.bing.net/th?q=${query}&w=300&h=450&c=7&rs=1&p=0&o=5&pid=1.7`;

                    karta.innerHTML = `
                        <img class="kniha-obalka" src="${coverUrl}" onerror="this.src='https://via.placeholder.com/200x300?text=Bez+obálky'">
                        <div class="kniha-nazev">${kniha.nazev}</div>
                        <div class="kniha-autor">${kniha.autor}</div>
                        <a href="${kniha.dobrovskyUrl}" target="_blank" class="btn-dobrovsky">Dobrovský</a>
                    `;
                    box.appendChild(karta);
                });
            });
    </script>
</body>
</html>
