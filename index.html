<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Moje Knihovna</title>
    <style>
        .knihovna-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 25px; padding: 20px; }
        .kniha-karta { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
        .kniha-obalka { width: 140px; height: 210px; object-fit: cover; margin-bottom: 10px; }
    </style>
</head>
<body>
    <main class="knihovna-grid" id="knihovna-box"></main>

    <script>
        fetch('books.json')
            .then(r => r.json())
            .then(knihy => {
                const box = document.getElementById('knihovna-box');
                knihy.forEach(kniha => {
                    const karta = document.createElement('div');
                    karta.className = 'kniha-karta';
                    karta.innerHTML = `
                        <img class="kniha-obalka" id="img-${kniha.isbn}" src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=">
                        <div><b>${kniha.nazev}</b></div>
                        <div>${kniha.autor}</div>
                    `;
                    box.appendChild(karta);

                    // Volání Google Books API
                    const q = `${kniha.nazev} ${kniha.autor}`;
                    fetch(`https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(q)}&maxResults=1`)
                        .then(r => r.json())
                        .then(data => {
                            if (data.items && data.items[0].volumeInfo.imageLinks) {
                                document.getElementById(`img-${kniha.isbn}`).src = data.items[0].volumeInfo.imageLinks.thumbnail;
                            } else {
                                document.getElementById(`img-${kniha.isbn}`).src = 'https://via.placeholder.com/140x210?text=Bez+obálky';
                            }
                        });
                });
            });
    </script>
</body>
</html>
