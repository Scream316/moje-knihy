<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Moje Knihovna</title>
    <style>
        .knihovna-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; padding: 20px; }
        .kniha-karta { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
        .kniha-obalka { width: 140px; height: 210px; object-fit: contain; margin-bottom: 10px; background: #f9f9f9; }
    </style>
</head>
<body>
    <div class="knihovna-grid" id="knihovna-box"></div>

    <script>
        fetch('books.json')
            .then(r => r.json())
            .then(knihy => {
                const box = document.getElementById('knihovna-box');
                knihy.forEach(kniha => {
                    const karta = document.createElement('div');
                    karta.className = 'kniha-karta';
                    
                    // Nyní hledáme podle názvu přes Google Image Search proxy
                    // Tato služba bere název a najde první odpovídající obrázek
                    const query = encodeURIComponent(kniha.nazev + " book cover");
                    const coverUrl = `https://tse3.mm.bing.net/th?q=${query}&w=200&h=300&c=7&rs=1&p=0&o=5&pid=1.7`;

                    karta.innerHTML = `
                        <img class="kniha-obalka" 
                             src="${coverUrl}" 
                             onerror="this.src='https://via.placeholder.com/140x210?text=Bez+obálky'">
                        <div class="kniha-nazev"><b>${kniha.nazev}</b></div>
                        <a href="${kniha.dobrovskyUrl}" target="_blank">Koupit</a>
                    `;
                    box.appendChild(karta);
                });
            });
    </script>
</body>
</html>
