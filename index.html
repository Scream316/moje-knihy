<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Moje Knihovna</title>
    <style>
        .knihovna-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; padding: 20px; }
        .kniha-karta { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
        .kniha-obalka { width: 140px; height: 210px; object-fit: cover; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="knihovna-grid" id="knihovna-box"></div>

    <script>
        fetch('books.json')
            .then(r => r.json())
            .then(knihy => {
                const box = document.getElementById('knihovna-box');
                knihy.forEach(kniha => {
                    const div = document.createElement('div');
                    div.className = 'kniha-karta';
                    
                    // Zkusíme jiný formát URL, který je méně náchylný na "Connection closed"
                    const isbn = kniha.isbn.replace(/-/g, '');
                    const coverUrl = `https://covers.openlibrary.org/b/isbn/${isbn}-M.jpg?default=false`;

                    div.innerHTML = `
                        <img class="kniha-obalka" 
                             src="${coverUrl}" 
                             onerror="this.onerror=null; this.src='https://via.placeholder.com/140x210?text=Bez+obálky'">
                        <div><b>${kniha.nazev}</b></div>
                        <a href="${kniha.dobrovskyUrl}" target="_blank">Koupit</a>
                    `;
                    box.appendChild(div);
                });
            });
    </script>
</body>
</html>
