<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Moje Knihovna</title>
</head>
<body>
    <h1>Moje Virtuální Knihovna</h1>
    <div id="knihovna-box"></div>

    <script>
        async function start() {
            try {
                const response = await fetch('books.json');
                if (!response.ok) throw new Error("Soubor nenalezen");
                const knihy = await response.json();
                
                const box = document.getElementById('knihovna-box');
                
                for (const kniha of knihy) {
                    const div = document.createElement('div');
                    div.style.marginBottom = "20px";
                    div.style.border = "1px solid #ccc";
                    div.innerHTML = `<h3>${kniha.nazev}</h3><p>${kniha.autor}</p>`;
                    box.appendChild(div);
                }
            } catch (e) {
                document.body.innerHTML = "<h1>Chyba: " + e.message + "</h1>";
            }
        }
        start();
    </script>
</body>
</html>
