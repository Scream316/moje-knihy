<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Wishlist</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f0f2f5; 
            padding: 40px; 
            color: #333; 
        }
        h1 { text-align: center; color: #1a1a1a; margin-bottom: 40px; }
        
        .knihovna-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
            gap: 30px; 
            max-width: 1200px; 
            margin: 0 auto; 
        }
        
        .kniha-karta { 
            background: white; 
            padding: 20px; 
            border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        /* Animace povyskočení */
        .kniha-karta:hover { 
            transform: translateY(-10px); 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .kniha-obalka { 
            width: 100%; 
            height: 250px; 
            object-fit: cover; 
            border-radius: 8px; 
            margin-bottom: 15px; 
            background: #f9f9f9;
        }
        
        .kniha-nazev { font-weight: 700; font-size: 1.1em; margin-bottom: 5px; }
        .kniha-autor { color: #666; margin-bottom: 15px; font-size: 0.9em; }
        
        .btn-dobrovsky { 
            display: inline-block; 
            padding: 10px 20px; 
            background-color: #27AE60; 
            color: white; 
            text-decoration: none; 
            border-radius: 25px; 
            font-weight: bold; 
            font-size: 0.85em;
            transition: background 0.3s;
        }
        
        .btn-dobrovsky:hover { background-color: #219150; }
    </style>
</head>
<body>

    <h1>Můj Wishlist</h1>
    <main class="knihovna-grid" id="knihovna-box"></main>

    <script>
        fetch('books.json')
            .then(r => r.json())
            .then(knihy => {
                const box = document.getElementById('knihovna-box');
                knihy.forEach(kniha => {
                    const karta = document.createElement('div');
                    karta.className = 'kniha-karta';
                    
                    const query = encodeURIComponent(kniha.nazev + " " + kniha.autor + " book cover");
                    const coverUrl = `https://tse3.mm.bing.net/th?q=${query}&w=300&h=450&c=7&rs=1&p=0&o=5&pid=1.7`;

                    karta.innerHTML = `
                        <img class="kniha-obalka" 
                             src="${coverUrl}" 
                             onerror="this.src='https://via.placeholder.com/200x300?text=Bez+obálky'">
                        <div class="kniha-nazev">${kniha.nazev}</div>
                        <div class="kniha-autor">${kniha.autor}</div>
                        <a href="${kniha.dobrovskyUrl}" target="_blank" class="btn-dobrovsky">Dobrovský</a>
                    `;
                    box.appendChild(karta);
                });
            });
    </script>
</body>
</html>
